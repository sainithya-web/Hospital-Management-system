{% extends 'base.html' %}

{% block title %}
Doctor Registration
{% endblock title %}

{% block body %}

<div class="container d-flex flex-grow-1 align-items-center justify-content-center py-5">
  <div class="row justify-content-center w-100">
    <div class="col-md-6 col-lg-5">

      <div class="card shadow-lg border-0 doctor-card animate__animated animate__fadeIn">

        <div class="card-header text-center login-header py-4" style="background: #0f2a5f !important;">
          <i class="fas fa-user-md fa-3x mb-3 text-white"></i>
          <h3 class="mb-0 font-weight-bold text-white">Doctor Portal</h3>
          <p class="small text-light mt-2 mb-0">Register your department and availability</p>
        </div>

        <div class="card-body p-5">
          <form action="/doctors" method="post">

            <div class="form-group mb-4">
              <label class="text-secondary small font-weight-bold">OFFICIAL EMAIL</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-light border-0"><i class="fas fa-envelope-open-text"></i></span>
                </div>
                <input type="email" class="form-control bg-light border-0"
                       name="email" value="{{current_user.email}}" readonly>
              </div>
            </div>

            <div class="form-group mb-4">
              <label class="text-secondary small font-weight-bold">DOCTOR NAME</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-white border-right-0"><i class="fas fa-user-doctor text-primary"></i></span>
                </div>
                <input type="text" class="form-control border-left-0 pl-0"
                       name="doctorname" placeholder="Dr. John Smith" required>
              </div>
            </div>

            <div class="form-group mb-4">
              <label class="text-secondary small font-weight-bold">SPECIALIZATION / DEPT</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-white border-right-0"><i class="fas fa-stethoscope text-primary"></i></span>
                </div>
                <input type="text" class="form-control border-left-0 pl-0"
                       name="dept" placeholder="e.g. Cardiology" required>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block py-3 mt-4 shadow-sm font-weight-bold">
              <i class="fas fa-plus-circle mr-2"></i> Register Specialist
            </button>

          </form>

          <div class="text-center mt-4">
            <a href="/details" class="text-muted small"><i class="fas fa-list-ul mr-1"></i> View Patient Lists</a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

{% endblock body %}
