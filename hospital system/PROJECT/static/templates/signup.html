{% extends 'base.html' %}

{% block title %}
Create Account
{% endblock title %}

{% block body %}

<div class="container d-flex flex-grow-1 align-items-center justify-content-center py-5">
  <div class="row justify-content-center w-100">
    <div class="col-md-5">

      <div class="card shadow-lg border-0 login-card">

        <div class="card-header text-center login-header py-4">
          <i class="fas fa-user-plus fa-3x mb-3 text-white"></i>
          <h3 class="mb-0 font-weight-bold text-white">Join H.M.S</h3>
          <p class="small text-light mt-2 mb-0">Create your account to get started</p>
        </div>

        <div class="card-body p-4">

          <form action="/signup" method="POST">

            <div class="form-group mb-3">
              <label class="text-secondary small font-weight-bold">USERNAME</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-white border-right-0"><i class="fas fa-user text-primary"></i></span>
                </div>
                <input type="text" class="form-control border-left-0 pl-0"
                       name="username" placeholder="Choose a username" required>
              </div>
            </div>

            <div class="form-group mb-3">
              <label class="text-secondary small font-weight-bold">I AM A...</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-white border-right-0"><i class="fas fa-user-tag text-primary"></i></span>
                </div>
                <select class="form-control border-left-0 pl-0" name="usertype" required>
                  <option disabled selected>Select user type</option>
                  <option value="Patient">Patient</option>
                  <option value="Doctor">Doctor</option>
                </select>
              </div>
            </div>

            <div class="form-group mb-3">
              <label class="text-secondary small font-weight-bold">EMAIL ADDRESS</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-white border-right-0"><i class="fas fa-envelope text-primary"></i></span>
                </div>
                <input type="email" class="form-control border-left-0 pl-0"
                       name="email" placeholder="email@example.com" required>
              </div>
              <small class="text-muted">We'll never share your email.</small>
            </div>

            <div class="form-group mb-4">
              <label class="text-secondary small font-weight-bold">PASSWORD</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-white border-right-0"><i class="fas fa-lock text-primary"></i></span>
                </div>
                <input type="password" class="form-control border-left-0 pl-0"
                       name="password" placeholder="Create a password" required>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block py-3 shadow-sm font-weight-bold">
              <i class="fas fa-check-circle mr-2"></i> Register Account
            </button>

          </form>

          <div class="text-center mt-4 pt-3 border-top">
            <span class="text-muted small">Already registered?</span><br>
            <a href="/login" class="font-weight-bold text-primary">
              <i class="fas fa-sign-in-alt mr-1"></i>Login here
            </a>
          </div>

        </div>

      </div>

    </div>
  </div>
</div>

{% endblock body %}
