{% extends 'base.html' %}

{% block title %}
Login
{% endblock title %}

{% block body %}

<div class="container d-flex flex-grow-1 align-items-center justify-content-center py-5">
  <div class="row justify-content-center w-100">
    <div class="col-md-5">

      <div class="card shadow-lg border-0 login-card animate__animated animate__fadeIn">

        <div class="card-header text-center login-header py-4">
          <i class="fas fa-user-shield fa-3x mb-3 text-white"></i>
          <h3 class="mb-0 font-weight-bold">Hospital Login</h3>
          <p class="small text-light mt-2 mb-0">Secure access to your medical dashboard</p>
        </div>

        <div class="card-body p-5">

          <form action="/login" method="post">

            <div class="form-group mb-4">
              <label class="text-secondary small font-weight-bold">EMAIL ADDRESS</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-white border-right-0"><i class="fas fa-envelope text-primary"></i></span>
                </div>
                <input type="email" class="form-control border-left-0 pl-0"
                       name="email" placeholder="name@hospital.com" required>
              </div>
            </div>

            <div class="form-group mb-4">
              <label class="text-secondary small font-weight-bold">PASSWORD</label>
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text bg-white border-right-0"><i class="fas fa-lock text-primary"></i></span>
                </div>
                <input type="password" class="form-control border-left-0 pl-0"
                       name="password" id="passwordField" placeholder="••••••••" required>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block py-3 mt-4 shadow-sm">
              <i class="fas fa-sign-in-alt mr-2"></i> Access Account
            </button>

          </form>

          <div class="text-center mt-4 pt-3 border-top">
            <span class="text-muted small">New to our system?</span><br>
            <a href="/signup" class="font-weight-bold text-primary">
              <i class="fas fa-user-plus mr-1"></i>Create an account
            </a>
          </div>

        </div>

      </div>

      <div class="text-center mt-4">
        <a href="/" class="text-secondary small"><i class="fas fa-arrow-left mr-1"></i> Back to Homepage</a>
      </div>

    </div>
  </div>
</div>

{% endblock body %}
